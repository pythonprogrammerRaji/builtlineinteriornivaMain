    <script>
        const param = new URLSearchParams(window.location.search)
        const slug = param.get("slug")

        console.log("Slug of", slug)

        const blog = blogDetails.find(b => b.slug === slug);

        console.log("blog of", blog)

        if(blog){
            document.getElementById("title").innerText = blog.title;
            document.getElementById("image").src = blog.image;
            document.getElementById("content").innerHTML = blog.content;
            document.getElementById("blogSection").style.backgroundImage = `url(${blog.image})`;
        } else {
            document.getElementById("title").innerText = "Blog Not Found";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
     <script>               
            emailjs.init({
                publicKey: 'pXIyHvEb8y3LNoEPn',
            });


                    
            document.getElementById("contact-form").addEventListener("submit", function(e){
                e.preventDefault();

                    let fullname = document.getElementById("name").value.trim();
                    let email = document.getElementById("email").value.trim();
                    let number = document.getElementById("number").value.trim();
                    let location = document.getElementById("location").value;
                    let message = document.getElementById("message").value.trim();

                    let params = {
                        full_name: fullname,
                        from_number: number,
                        from_email: email,
                        from_location:location,
                        message: message
                    }

                    emailjs
                    .send('service_gyzkhjq', 'template_159y1f4', params)
                    .then(()=>{
                        alert('Email Successfully Submitted ✅')
                        document.getElementById("form").reset();    
                    })
                    .catch(()=>{
                       alert("Thank You...✅😊😀")
                    })
            })
